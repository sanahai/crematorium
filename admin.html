<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지 – 전국 화장장 안내</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">

<!-- ===== HEADER ===== -->
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-logo">
      <i class="fa-solid fa-dove"></i>
      <span>전국 화장장 안내</span>
    </a>
    <nav class="header-nav">
      <a href="index.html" class="nav-link">화장장 목록</a>
      <a href="admin.html" class="nav-link active">관리자</a>
    </nav>
  </div>
</header>

<!-- ===== ADMIN MAIN ===== -->
<main class="admin-main">
  <div class="admin-header-row">
    <div>
      <h1 class="admin-title"><i class="fa-solid fa-screwdriver-wrench"></i> 화장장 정보 관리</h1>
      <p class="admin-subtitle">화장장 정보를 추가·수정·삭제하세요. 변경 내용은 즉시 반영됩니다.</p>
    </div>
    <button class="add-btn" id="addNewBtn">
      <i class="fa-solid fa-plus"></i> 새 화장장 추가
    </button>
  </div>

  <!-- 검색 -->
  <div class="admin-search-wrap">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="adminSearch" placeholder="화장장 이름, 지역으로 검색..." class="admin-search-input" />
  </div>

  <!-- 테이블 -->
  <div class="admin-table-wrap">
    <table class="admin-table" id="adminTable">
      <thead>
        <tr>
          <th>화장장명</th>
          <th>지역</th>
          <th>시군구</th>
          <th>전화번호</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="adminTableBody">
        <!-- JS 렌더링 -->
      </tbody>
    </table>
    <div class="state-box" id="adminLoading">
      <i class="fa-solid fa-spinner fa-spin"></i><p>불러오는 중...</p>
    </div>
    <div class="state-box hidden" id="adminEmpty">
      <i class="fa-solid fa-database"></i><p>데이터가 없습니다.</p>
    </div>
  </div>
</main>

<!-- ===== 편집 모달 ===== -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal-box modal-lg">
    <div class="modal-header">
      <h2 id="modalTitle"><i class="fa-solid fa-pen-to-square"></i> 화장장 정보 편집</h2>
      <button class="modal-close" id="editModalClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <form id="editForm" class="edit-form">
        <input type="hidden" id="fId" />

        <div class="form-row-2">
          <div class="form-group">
            <label for="fName">화장장명 <span class="required">*</span></label>
            <input type="text" id="fName" required placeholder="예: 서울시립승화원" />
          </div>
          <div class="form-group">
            <label for="fRegion">지역(시도) <span class="required">*</span></label>
            <select id="fRegion" required>
              <option value="">-- 선택 --</option>
              <option>서울특별시</option><option>경기도</option><option>인천광역시</option>
              <option>부산광역시</option><option>대구광역시</option><option>광주광역시</option>
              <option>대전광역시</option><option>울산광역시</option><option>세종특별자치시</option>
              <option>강원특별자치도</option><option>충청북도</option><option>충청남도</option>
              <option>전라북도</option><option>전라남도</option><option>경상북도</option>
              <option>경상남도</option><option>제주특별자치도</option>
            </select>
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label for="fCity">시군구</label>
            <input type="text" id="fCity" placeholder="예: 고양시" />
          </div>
          <div class="form-group">
            <label for="fPhone">전화번호</label>
            <input type="text" id="fPhone" placeholder="031-960-0235~7" />
          </div>
        </div>

        <div class="form-group">
          <label for="fAddress">주소</label>
          <input type="text" id="fAddress" placeholder="도로명 주소 전체" />
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label for="fMapLink">지도 링크 (카카오맵 등)</label>
            <input type="url" id="fMapLink" placeholder="https://map.kakao.com/..." />
          </div>
          <div class="form-group">
            <label for="fSourceUrl">공식 출처 URL</label>
            <input type="url" id="fSourceUrl" placeholder="https://..." />
          </div>
        </div>

        <div class="form-group">
          <label for="fOperatingHours">운영시간 요약</label>
          <input type="text" id="fOperatingHours" placeholder="예: 07:00 ~ 17:00 (연중무휴)" />
        </div>

        <div class="form-group">
          <label for="fSchedule">회차별 화장 시간표
            <span class="form-hint">| 로 구분: 예) 1회차 07:00 | 2회차 08:00 | ...</span>
          </label>
          <textarea id="fSchedule" rows="3" placeholder="1회차 07:00 | 2회차 08:00 | 3회차 09:00 ..."></textarea>
        </div>

        <div class="form-group">
          <label for="fRequiredDocs">필요 서류 목록
            <span class="form-hint">권장 포맷: [병사] [외인사] [개장유골] [외국인] [공통] 섹션 + 필수/추가/유의/절차/문의 라벨</span>
          </label>
          <textarea id="fRequiredDocs" rows="9" placeholder="[병사]&#10;필수: 사망진단서 또는 시체검안서 원본 1부&#10;필수: 신청인 신분증&#10;추가: 가족관계증명서(시설 요청 시)&#10;유의: 원본 여부는 방문 전 전화 확인&#10;&#10;[외인사]&#10;필수: 사망진단서 또는 시체검안서&#10;필수: 검사지휘서&#10;&#10;[공통]&#10;공통: e하늘 예약번호&#10;절차: 접수 창구 제출 후 사용료 납부"></textarea>
        </div>

        <div class="form-group">
          <label for="fReservationInfo">예약 안내</label>
          <textarea id="fReservationInfo" rows="4" placeholder="예약 방법, 가능 일정 등..."></textarea>
        </div>

        <div class="form-group">
          <label for="fFeeInfo">사용료 안내</label>
          <textarea id="fFeeInfo" rows="4" placeholder="관내/관외 구분, 감면 기준 등..."></textarea>
        </div>

        <div class="form-group">
          <label for="fNotice">공지사항</label>
          <textarea id="fNotice" rows="3" placeholder="특이사항, 변경 안내 등..."></textarea>
        </div>

        <div class="form-group">
          <label class="toggle-label">
            <input type="checkbox" id="fIsActive" checked />
            <span class="toggle-text">활성화 (목록에 표시)</span>
          </label>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="modal-btn save-btn" id="editSaveBtn"><i class="fa-solid fa-floppy-disk"></i> 저장</button>
      <button class="modal-btn close-btn" id="editCancelBtn">취소</button>
    </div>
  </div>
</div>

<!-- ===== 삭제 확인 모달 ===== -->
<div class="modal-overlay hidden" id="deleteModal">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h2><i class="fa-solid fa-triangle-exclamation" style="color:#e74c3c;"></i> 삭제 확인</h2>
      <button class="modal-close" id="deleteModalClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <p class="delete-confirm-msg"><strong id="deleteTargetName"></strong> 화장장 정보를 삭제하시겠습니까?<br>삭제된 데이터는 복구되지 않습니다.</p>
    </div>
    <div class="modal-footer">
      <button class="modal-btn danger-btn" id="deleteConfirmBtn"><i class="fa-solid fa-trash"></i> 삭제</button>
      <button class="modal-btn close-btn" id="deleteCancelBtn">취소</button>
    </div>
  </div>
</div>

<!-- ===== 토스트 ===== -->
<div class="toast-msg hidden" id="toastMsg"></div>

<!-- ===== FOOTER ===== -->
<footer class="site-footer">
  <p>관리자 전용 페이지입니다. 데이터 변경 시 주의하세요.</p>
</footer>

<script src="./js/admin.js"></script>
</body>
</html>
